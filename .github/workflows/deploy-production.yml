name: Build & Push to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-push
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/wopr-network/wopr-platform

jobs:
  ci:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  build-and-push:
    runs-on: [self-hosted, Linux, X64]
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate image tags
        id: meta
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:staging
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: [self-hosted, Linux, X64]
    needs: build-and-push
    environment: staging
    steps:
      - name: Record previous image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER || 'root' }}
          key: ${{ secrets.SSH_DEPLOY_KEY || secrets.PROD_SSH_KEY }}
          script: |
            COMPOSE_DIR="${STAGING_COMPOSE_DIR:-/opt/wopr-platform}"
            cd "$COMPOSE_DIR" || { echo "Compose dir $COMPOSE_DIR not found — first deploy?"; exit 0; }
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml"
            CURRENT=$($COMPOSE ps -q staging-api 2>/dev/null | head -1)
            if [ -n "$CURRENT" ]; then
              SHA=$(docker inspect --format='{{.Config.Image}}' "$CURRENT" 2>/dev/null | grep -oP ':\K[a-f0-9]{7,}$' || true)
              if [ -n "$SHA" ]; then
                echo "$SHA" > "$COMPOSE_DIR/.previous-staging-sha"
                echo "Recorded previous SHA: $SHA"
              fi
            else
              echo "No previous staging container found"
            fi

      - name: Deploy to staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER || 'root' }}
          key: ${{ secrets.SSH_DEPLOY_KEY || secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            COMPOSE_DIR="${STAGING_COMPOSE_DIR:-/opt/wopr-platform}"
            cd "$COMPOSE_DIR"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml"
            $COMPOSE stop staging-api 2>/dev/null || true
            $COMPOSE pull staging-api
            # Copy prod DB to staging (skip if staging postgres not configured)
            if $COMPOSE ps staging-postgres 2>/dev/null | grep -q running; then
              PG_USER="${STAGING_PG_USER:-wopr}"
              PG_DB="${STAGING_PG_DB:-wopr_platform}"
              $COMPOSE exec -T staging-postgres psql -U "$PG_USER" -d "$PG_DB" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;" 2>/dev/null || true
              docker compose exec -T postgres pg_dump -U "$PG_USER" --no-owner --no-acl "$PG_DB" | \
                $COMPOSE exec -T staging-postgres psql -U "$PG_USER" -d "$PG_DB" -q
            fi
            $COMPOSE up -d staging-api
            echo "Staging API deployed"

      - name: Health check
        id: health
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER || 'root' }}
          key: ${{ secrets.SSH_DEPLOY_KEY || secrets.PROD_SSH_KEY }}
          script: |
            COMPOSE_DIR="${STAGING_COMPOSE_DIR:-/opt/wopr-platform}"
            COMPOSE="docker compose -f $COMPOSE_DIR/docker-compose.yml -f $COMPOSE_DIR/docker-compose.staging.yml"
            for i in $(seq 1 30); do
              CONTAINER=$($COMPOSE ps -q staging-api 2>/dev/null | head -1)
              if [ -n "$CONTAINER" ] && docker exec "$CONTAINER" curl -sf http://localhost:3100/health >/dev/null 2>&1; then
                echo "Staging API is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "Health check timed out"
            $COMPOSE logs --tail 20 staging-api
            exit 1

      - name: Rollback on failure
        if: steps.health.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER || 'root' }}
          key: ${{ secrets.SSH_DEPLOY_KEY || secrets.PROD_SSH_KEY }}
          script: |
            echo "Health check failed — rolling back staging-api"
            COMPOSE_DIR="${STAGING_COMPOSE_DIR:-/opt/wopr-platform}"
            cd "$COMPOSE_DIR"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml"
            $COMPOSE logs --tail=30 staging-api
            PREV_TAG=$(cat "$COMPOSE_DIR/.previous-staging-sha" 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              echo "Rolling back to ${{ env.IMAGE }}:${PREV_TAG}"
              docker pull ${{ env.IMAGE }}:${PREV_TAG}
              docker tag ${{ env.IMAGE }}:${PREV_TAG} ${{ env.IMAGE }}:staging
              $COMPOSE up -d --force-recreate staging-api
              echo "Rollback complete"
            else
              echo "::warning::No previous image tag available for rollback"
              $COMPOSE stop staging-api
            fi

      - name: Prune old images
        if: steps.health.outcome != 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER || 'root' }}
          key: ${{ secrets.SSH_DEPLOY_KEY || secrets.PROD_SSH_KEY }}
          script: docker image prune -f

      - name: Fail workflow if health check failed
        if: steps.health.outcome == 'failure'
        run: |
          echo "::error::Staging deployment health check failed. Rollback executed."
          exit 1
