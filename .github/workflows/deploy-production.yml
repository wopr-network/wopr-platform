name: Build & Push to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-push
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/wopr-network/wopr-platform

jobs:
  ci:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  build-and-push:
    runs-on: [self-hosted, Linux, X64]
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate image tags
        id: meta
        run: |
          SHA="${GITHUB_SHA::7}"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:staging
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: [self-hosted, Linux, X64]
    needs: build-and-push
    steps:
      - name: Deploy to staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/wopr-platform
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.staging.yml"
            $COMPOSE stop staging-api 2>/dev/null || true
            $COMPOSE pull staging-api
            $COMPOSE exec -T staging-postgres psql -U wopr -d wopr_platform -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;" 2>/dev/null || true
            docker compose exec -T postgres pg_dump -U wopr --no-owner --no-acl wopr_platform | \
              $COMPOSE exec -T staging-postgres psql -U wopr -d wopr_platform -q
            $COMPOSE up -d staging-api
            echo "Staging API deployed"

      - name: Verify staging health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            for i in $(seq 1 30); do
              if docker exec wopr-platform-staging-api-1 curl -sf http://localhost:3100/health >/dev/null 2>&1; then
                echo "Staging API is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "Health check timed out"
            docker logs wopr-platform-staging-api-1 --tail 20
            exit 1
